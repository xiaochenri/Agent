<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>stockmind-agent Architecture</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #172033;
      --muted: #5b6578;
      --line: #8390a6;
      --runtime: #e8f2ff;
      --runtime-border: #5b8fd9;
      --biz: #ecf8f1;
      --biz-border: #4d9b6b;
      --entry: #fff7e8;
      --entry-border: #c8912d;
      --card: #ffffff;
      --shadow: 0 8px 24px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
    }

    main {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 28px 20px 36px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .diagram-wrap {
      overflow-x: auto;
      background: var(--card);
      border: 1px solid #dde4ef;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    svg {
      display: block;
      min-width: 1180px;
      width: 100%;
      height: auto;
    }

    .cluster-title {
      font-size: 17px;
      font-weight: 700;
      fill: var(--text);
    }

    .node-title {
      font-size: 14px;
      font-weight: 700;
      fill: var(--text);
    }

    .node-subtitle {
      font-size: 12px;
      fill: var(--muted);
    }

    .small {
      font-size: 11px;
      fill: var(--muted);
    }

    .edge {
      stroke: var(--line);
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrow);
    }

    .edge-soft {
      stroke: #a7b1c3;
      stroke-width: 1.8;
      fill: none;
      marker-end: url(#arrow-soft);
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: inline-block;
      border: 1px solid;
    }

    @media (max-width: 720px) {
      main {
        padding: 20px 12px 28px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>stockmind-agent 项目架构图</h1>
    <p class="subtitle">`javascope-agent` 承担通用 Agent Runtime；`stockmind-*` 承担股票业务接入、HTTP 入口、记忆和知识库能力。</p>

    <div class="diagram-wrap" aria-label="stockmind-agent architecture diagram">
      <svg viewBox="0 0 1280 900" role="img">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#8390a6"></path>
          </marker>
          <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#a7b1c3"></path>
          </marker>
          <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#172033" flood-opacity="0.12"></feDropShadow>
          </filter>
        </defs>

        <rect x="30" y="24" width="1220" height="830" rx="12" fill="#fbfcff" stroke="#dde4ef"></rect>

        <rect x="70" y="82" width="270" height="232" rx="10" fill="var(--entry)" stroke="var(--entry-border)" stroke-width="2"></rect>
        <text x="92" y="114" class="cluster-title">入口与体验层</text>

        <rect x="88" y="138" width="232" height="58" rx="8" fill="#fff" stroke="#d4b16d" filter="url(#nodeShadow)"></rect>
        <text x="204" y="162" text-anchor="middle" class="node-title">用户 / 前端页面</text>
        <text x="204" y="181" text-anchor="middle" class="node-subtitle">chat.html / stream-chat.html</text>

        <rect x="88" y="226" width="232" height="62" rx="8" fill="#fff" stroke="#d4b16d" filter="url(#nodeShadow)"></rect>
        <text x="204" y="251" text-anchor="middle" class="node-title">AgentDemoController</text>
        <text x="204" y="270" text-anchor="middle" class="node-subtitle">HTTP / SSE / 会话入口</text>

        <rect x="386" y="82" width="806" height="642" rx="10" fill="var(--runtime)" stroke="var(--runtime-border)" stroke-width="2"></rect>
        <text x="410" y="114" class="cluster-title">javascope-agent：通用 Agent Runtime</text>

        <rect x="424" y="140" width="220" height="62" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="534" y="165" text-anchor="middle" class="node-title">ReActAgent</text>
        <text x="534" y="184" text-anchor="middle" class="node-subtitle">Agent 执行入口</text>

        <rect x="424" y="238" width="220" height="62" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="534" y="263" text-anchor="middle" class="node-title">InputRouter</text>
        <text x="534" y="282" text-anchor="middle" class="node-subtitle">chat / meta / task 路由</text>

        <rect x="424" y="338" width="220" height="64" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="534" y="363" text-anchor="middle" class="node-title">ReAct Loop</text>
        <text x="534" y="382" text-anchor="middle" class="node-subtitle">多轮 reasoning / 状态推进</text>

        <rect x="424" y="443" width="220" height="64" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="534" y="468" text-anchor="middle" class="node-title">AgentToolCallExtractor</text>
        <text x="534" y="487" text-anchor="middle" class="node-subtitle">提取 tool_calls</text>

        <rect x="696" y="338" width="220" height="64" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="806" y="363" text-anchor="middle" class="node-title">ToolCallDispatcher</text>
        <text x="806" y="382" text-anchor="middle" class="node-subtitle">工具分发 / 计划衔接</text>

        <rect x="696" y="443" width="220" height="64" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="806" y="468" text-anchor="middle" class="node-title">PlanExecutor</text>
        <text x="806" y="487" text-anchor="middle" class="node-subtitle">步骤执行 / 重试 / 依赖</text>

        <rect x="696" y="548" width="220" height="64" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="806" y="573" text-anchor="middle" class="node-title">StepValidatorTool</text>
        <text x="806" y="592" text-anchor="middle" class="node-subtitle">步骤输出语义校验</text>

        <rect x="956" y="238" width="196" height="56" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="1054" y="262" text-anchor="middle" class="node-title">CreatePlanTool</text>
        <text x="1054" y="280" text-anchor="middle" class="node-subtitle">创建计划</text>

        <rect x="956" y="318" width="196" height="56" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="1054" y="342" text-anchor="middle" class="node-title">RevisePlanTool</text>
        <text x="1054" y="360" text-anchor="middle" class="node-subtitle">失败后重规划</text>

        <rect x="956" y="398" width="196" height="56" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="1054" y="422" text-anchor="middle" class="node-title">ClarifyRequirementTool</text>
        <text x="1054" y="440" text-anchor="middle" class="node-subtitle">需求澄清</text>

        <rect x="956" y="500" width="196" height="64" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="1054" y="525" text-anchor="middle" class="node-title">FinalAnswerSynthesizer</text>
        <text x="1054" y="544" text-anchor="middle" class="node-subtitle">最终答案合成</text>

        <rect x="956" y="604" width="196" height="56" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="1054" y="628" text-anchor="middle" class="node-title">IndependentVerifier</text>
        <text x="1054" y="646" text-anchor="middle" class="node-subtitle">可选独立校验</text>

        <rect x="424" y="622" width="220" height="64" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="534" y="647" text-anchor="middle" class="node-title">AgentToolExecutor</text>
        <text x="534" y="666" text-anchor="middle" class="node-subtitle">工具执行 SPI</text>

        <rect x="696" y="652" width="220" height="48" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="806" y="681" text-anchor="middle" class="node-title">ReflectiveAgentToolExecutor</text>

        <rect x="696" y="140" width="220" height="62" rx="8" fill="#fff" stroke="#8db1e4" filter="url(#nodeShadow)"></rect>
        <text x="806" y="165" text-anchor="middle" class="node-title">AgentChatModelClient</text>
        <text x="806" y="184" text-anchor="middle" class="node-subtitle">OpenAI-compatible API</text>

        <rect x="70" y="372" width="270" height="352" rx="10" fill="var(--biz)" stroke="var(--biz-border)" stroke-width="2"></rect>
        <text x="92" y="404" class="cluster-title">stockmind 业务层</text>

        <rect x="88" y="430" width="232" height="70" rx="8" fill="#fff" stroke="#80bf95" filter="url(#nodeShadow)"></rect>
        <text x="204" y="455" text-anchor="middle" class="node-title">StockAgentBusinessConfiguration</text>
        <text x="204" y="474" text-anchor="middle" class="node-subtitle">股票 prompt / 澄清策略</text>
        <text x="204" y="491" text-anchor="middle" class="small">AgentBusinessPromptCustomizer</text>

        <rect x="88" y="544" width="232" height="70" rx="8" fill="#fff" stroke="#80bf95" filter="url(#nodeShadow)"></rect>
        <text x="204" y="569" text-anchor="middle" class="node-title">StockAgentTools</text>
        <text x="204" y="588" text-anchor="middle" class="node-subtitle">market_quote / news_search</text>
        <text x="204" y="605" text-anchor="middle" class="small">knowledge_search</text>

        <rect x="88" y="652" width="232" height="54" rx="8" fill="#fff" stroke="#80bf95" filter="url(#nodeShadow)"></rect>
        <text x="204" y="675" text-anchor="middle" class="node-title">stockmind-common</text>
        <text x="204" y="693" text-anchor="middle" class="node-subtitle">OceanBase 向量检索 / 文档抽取</text>

        <path class="edge" d="M204 196 L204 226"></path>
        <path class="edge" d="M320 257 C360 257, 374 171, 424 171"></path>
        <path class="edge-soft" d="M204 288 C204 340, 500 336, 500 338"></path>

        <path class="edge" d="M534 202 L534 238"></path>
        <path class="edge" d="M534 300 L534 338"></path>
        <path class="edge" d="M534 402 L534 443"></path>
        <path class="edge" d="M644 475 C672 475, 672 370, 696 370"></path>
        <path class="edge" d="M806 402 L806 443"></path>
        <path class="edge" d="M806 507 L806 548"></path>
        <path class="edge-soft" d="M916 370 C940 370, 930 266, 956 266"></path>
        <path class="edge-soft" d="M916 370 C936 370, 936 346, 956 346"></path>
        <path class="edge-soft" d="M916 370 C940 370, 930 426, 956 426"></path>
        <path class="edge-soft" d="M644 370 C665 320, 680 202, 696 171"></path>
        <path class="edge-soft" d="M1054 294 L1054 318"></path>
        <path class="edge-soft" d="M1054 454 L1054 500"></path>
        <path class="edge-soft" d="M1054 564 L1054 604"></path>
        <path class="edge" d="M696 676 L644 660"></path>
        <path class="edge" d="M534 622 L534 507"></path>

        <path class="edge-soft" d="M320 465 C355 465, 360 154, 424 154"></path>
        <path class="edge" d="M424 654 C376 654, 370 579, 320 579"></path>
        <path class="edge" d="M204 614 L204 652"></path>
        <path class="edge-soft" d="M320 579 C392 579, 620 676, 696 676"></path>

        <text x="350" y="250" class="small">调用 Agent</text>
        <text x="350" y="444" class="small">拼接记忆 / 会话</text>
        <text x="336" y="454" class="small">业务规则注入</text>
        <text x="348" y="610" class="small">注册 @AgentTool</text>
      </svg>
    </div>

    <div class="legend">
      <span><i class="swatch" style="background: var(--entry); border-color: var(--entry-border);"></i>入口与体验层</span>
      <span><i class="swatch" style="background: var(--runtime); border-color: var(--runtime-border);"></i>通用 Agent Runtime</span>
      <span><i class="swatch" style="background: var(--biz); border-color: var(--biz-border);"></i>股票业务层</span>
    </div>
  </main>
</body>
</html>
