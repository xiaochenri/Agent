  text-decoration: none;

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;

h1,
h2,
h3,
h4,
h5,
h6,
p {

h3,
h4,
h5,
h6 {

b,
strong,

  gap: 12px;
  width: 100%;
  padding: 0;

  overflow-wrap: break-word;

  corner-shape: superellipse(1.5);
  color: var(--card-foreground);

  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {

  left: 0;

    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {

  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {

  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;

  color: var(--accent-foreground);
  background: var(--accent);

  clip: rect(0, 0, 0, 0);

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;

  padding: 0 8px;

  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;

}

.btn:is(.btn-block, .viz-tile) {

}

  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {

}

.btn:not(:disabled):hover {

  color: var(--muted-foreground);

.btn:disabled {

  border-radius: var(--radius-lg);

  min-height: 72px;
  padding: 8px 10px;

.form-select:focus-visible {

  gap: 6px;

  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);

  background-color: var(--secondary);

  pointer-events: none;

.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;

  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {

  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);

  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;div id=&quot;stock-business-module-architecture&quot;&gt;
  &lt;style&gt;
    #stock-business-module-architecture { color: var(--foreground); font-family: system-ui, -apple-system, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; }

    #stock-business-module-architecture h1, #stock-business-module-architecture h2, #stock-business-module-architecture h3, #stock-business-module-architecture p { margin: 0; }
    #stock-business-module-architecture h1 { font-size: calc(var(--font-size-base) * 2); font-weight: 500; }
    #stock-business-module-architecture h2 { font-size: calc(var(--font-size-base) * 1.35); font-weight: 500; }
    #stock-business-module-architecture h3 { font-size: var(--font-size-base); font-weight: 500; }
    #stock-business-module-architecture .lede { margin-top: 8px; color: var(--muted-foreground); }
    #stock-business-module-architecture .metrics { display: flex; flex-wrap: wrap; gap: 8px; }
    #stock-business-module-architecture .metric { min-width: 88px; padding: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); }
    #stock-business-module-architecture .metric strong { display: block; font-size: calc(var(--font-size-base) * 1.35); font-weight: 500; }
    #stock-business-module-architecture .metric span { color: var(--muted-foreground); font-size: calc(var(--font-size-base) - 2px); }
    #stock-business-module-architecture .tabs { display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    #stock-business-module-architecture .tab { border: 1px solid var(--border); border-radius: 8px; padding: 7px 11px; color: var(--foreground); background: transparent; cursor: pointer; }
    #stock-business-module-architecture .tab[aria-selected=&quot;true&quot;] { color: var(--primary-foreground); background: var(--primary); border-color: var(--primary); }
    #stock-business-module-architecture .panel { display: none; }
    #stock-business-module-architecture .panel.active { display: block; }
    #stock-business-module-architecture .canvas { overflow-x: auto; padding: 16px 0 4px; }

    #stock-business-module-architecture .lane &gt; p { margin: 5px 0 12px; color: var(--muted-foreground); font-size: calc(var(--font-size-base) - 2px); }
    #stock-business-module-architecture .stack { display: grid; gap: 8px; }
    #stock-business-module-architecture .node { position: relative; padding: 10px; border: 1px solid var(--border); border-radius: 9px; background: var(--background); }
    #stock-business-module-architecture .node strong, #stock-business-module-architecture .node small { display: block; }
    #stock-business-module-architecture .node small { margin-top: 4px; color: var(--muted-foreground); font-size: calc(var(--font-size-base) - 2px); }
    #stock-business-module-architecture .node.primary { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 12%, var(--background)); }
    #stock-business-module-architecture .node.external { border-style: dashed; }
    #stock-business-module-architecture .arrow { text-align: center; color: var(--muted-foreground); font-size: 18px; }
    #stock-business-module-architecture .runtime-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    #stock-business-module-architecture .runtime-grid .wide { grid-column: span 2; }
    #stock-business-module-architecture .tool-map { min-width: 1040px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    #stock-business-module-architecture .tool-group { padding: 14px; border-top: 3px solid var(--primary); background: color-mix(in srgb, var(--card) 72%, transparent); }
    #stock-business-module-architecture .tool-group:nth-child(2) { border-top-color: var(--viz-series-2); }
    #stock-business-module-architecture .tool-group:nth-child(3) { border-top-color: var(--viz-series-3); }
    #stock-business-module-architecture .tool-group:nth-child(4) { border-top-color: var(--viz-series-4); }
    #stock-business-module-architecture .tool-group:nth-child(5) { border-top-color: var(--viz-series-5); }
    #stock-business-module-architecture .tool-group &gt; p { margin: 5px 0 12px; color: var(--muted-foreground); font-size: calc(var(--font-size-base) - 2px); }
    #stock-business-module-architecture .tool { padding: 8px 0; border-top: 1px solid var(--border); }
    #stock-business-module-architecture .tool:first-of-type { border-top: 0; }
    #stock-business-module-architecture .tool code { color: var(--foreground); background: var(--muted); }
    #stock-business-module-architecture .tool span { display: block; margin-top: 3px; color: var(--muted-foreground); font-size: calc(var(--font-size-base) - 2px); }
    #stock-business-module-architecture .dependency { min-width: 1040px; display: grid; grid-template-columns: 1.1fr 34px 1.4fr 34px 1.3fr 34px 1.3fr; gap: 8px; align-items: stretch; }
    #stock-business-module-architecture .module { padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: color-mix(in srgb, var(--card) 72%, transparent); }
    #stock-business-module-architecture .module ul { margin: 10px 0 0; padding-left: 18px; color: var(--muted-foreground); font-size: calc(var(--font-size-base) - 2px); }
    #stock-business-module-architecture .module li + li { margin-top: 5px; }
    #stock-business-module-architecture .module-arrow { display: grid; place-items: center; color: var(--primary); font-size: 24px; }
    #stock-business-module-architecture .legend { display: flex; flex-wrap: wrap; gap: 12px; color: var(--muted-foreground); font-size: calc(var(--font-size-base) - 2px); }
    #stock-business-module-architecture .legend b { color: var(--foreground); font-weight: 500; }
    @media (max-width: 620px) { #stock-business-module-architecture .hero { grid-template-columns: 1fr; } #stock-business-module-architecture .metrics { justify-content: flex-start; } }
  &lt;/style&gt;

  &lt;main class=&quot;shell&quot;&gt;
    &lt;header class=&quot;hero&quot;&gt;
      &lt;div&gt;
        &lt;h1&gt;StockMind 业务模块架构&lt;/h1&gt;
        &lt;p class=&quot;lede&quot;&gt;以股票业务工具模块为中心，展开请求入口、Agent 编排、应用用例、外部数据适配及用户会话边界。&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;metrics&quot; aria-label=&quot;架构摘要&quot;&gt;
        &lt;div class=&quot;metric&quot;&gt;&lt;strong&gt;15&lt;/strong&gt;&lt;span&gt;业务工具与共用类&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;metric&quot;&gt;&lt;strong&gt;8&lt;/strong&gt;&lt;span&gt;应用数据端口&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;metric&quot;&gt;&lt;strong&gt;8&lt;/strong&gt;&lt;span&gt;外部 Provider&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/header&gt;

    &lt;nav class=&quot;tabs&quot; aria-label=&quot;架构视图&quot;&gt;
      &lt;button class=&quot;tab&quot; type=&quot;button&quot; role=&quot;tab&quot; aria-selected=&quot;true&quot; aria-controls=&quot;overview&quot; id=&quot;overview-tab&quot;&gt;运行时总览&lt;/button&gt;
      &lt;button class=&quot;tab&quot; type=&quot;button&quot; role=&quot;tab&quot; aria-selected=&quot;false&quot; aria-controls=&quot;tools&quot; id=&quot;tools-tab&quot;&gt;业务工具地图&lt;/button&gt;
      &lt;button class=&quot;tab&quot; type=&quot;button&quot; role=&quot;tab&quot; aria-selected=&quot;false&quot; aria-controls=&quot;dependencies&quot; id=&quot;dependencies-tab&quot;&gt;模块依赖链&lt;/button&gt;
    &lt;/nav&gt;

    &lt;section class=&quot;panel active&quot; id=&quot;overview&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;overview-tab&quot;&gt;
      &lt;div class=&quot;canvas&quot; aria-label=&quot;从用户请求到外部数据源的运行时架构&quot;&gt;
        &lt;div class=&quot;lanes&quot;&gt;
          &lt;section class=&quot;lane&quot;&gt;
            &lt;h2&gt;入口与会话&lt;/h2&gt;&lt;p&gt;HTTP、SSE、用户上下文与业务会话。&lt;/p&gt;
            &lt;div class=&quot;stack&quot;&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;Web Client&lt;/strong&gt;&lt;small&gt;chat.html / stream-chat.html&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;arrow&quot;&gt;↓&lt;/div&gt;
              &lt;div class=&quot;node primary&quot;&gt;&lt;strong&gt;AgentDemoController&lt;/strong&gt;&lt;small&gt;REST / 流式接口&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;arrow&quot;&gt;↓&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;javascope-user&lt;/strong&gt;&lt;small&gt;Conversation · UserMemory · JDBC Repository&lt;/small&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/section&gt;

          &lt;section class=&quot;lane&quot;&gt;
            &lt;h2&gt;Agent Runtime&lt;/h2&gt;&lt;p&gt;输入路由、策略、计划、工具调用、上下文与最终校验。&lt;/p&gt;
            &lt;div class=&quot;runtime-grid&quot;&gt;
              &lt;div class=&quot;node primary wide&quot;&gt;&lt;strong&gt;StockBusinessAgentHandler → ReActAgent&lt;/strong&gt;&lt;small&gt;绑定 stock 业务、发起一次 Agent 执行&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;InputRouter&lt;/strong&gt;&lt;small&gt;判断直答或任务型请求&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;ExecutionStrategy&lt;/strong&gt;&lt;small&gt;Direct Reply / ReAct / Plan-ReAct&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;PromptAssembler&lt;/strong&gt;&lt;small&gt;提示词与最小工作上下文&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;PlanExecutor&lt;/strong&gt;&lt;small&gt;计划、分派、失败恢复与重规划&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;Tool Executor&lt;/strong&gt;&lt;small&gt;授权、重试、缓存、限流、超时&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;验证器&lt;/strong&gt;&lt;small&gt;工具契约、财务语义、最终答案语义&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node wide&quot;&gt;&lt;strong&gt;Context / Trace&lt;/strong&gt;&lt;small&gt;WorkingContext · PromptBudget · ExecutionTrace · ExecutionLogStore&lt;/small&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/section&gt;

          &lt;section class=&quot;lane&quot;&gt;
            &lt;h2&gt;StockMind 业务能力&lt;/h2&gt;&lt;p&gt;工具只做输入映射、业务调用和统一输出；用例层承载业务编排。&lt;/p&gt;
            &lt;div class=&quot;stack&quot;&gt;
              &lt;div class=&quot;node primary&quot;&gt;&lt;strong&gt;business.tool&lt;/strong&gt;&lt;small&gt;15 个工具、映射器、错误模型、财报期间解析器&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;arrow&quot;&gt;↓&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;stockmind-application&lt;/strong&gt;&lt;small&gt;分析、快照、因子、估值、数据端口&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;arrow&quot;&gt;↓&lt;/div&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;stockmind-domain&lt;/strong&gt;&lt;small&gt;行情、标的、因子、论点、业务信号&lt;/small&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/section&gt;

          &lt;section class=&quot;lane&quot;&gt;
            &lt;h2&gt;数据与模型&lt;/h2&gt;&lt;p&gt;端口由基础设施实现；模型与数据源均位于业务核心之外。&lt;/p&gt;
            &lt;div class=&quot;stack&quot;&gt;
              &lt;div class=&quot;node&quot;&gt;&lt;strong&gt;模型提供方&lt;/strong&gt;&lt;small&gt;OpenAiCompatibleAgentChatModelClient&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node external&quot;&gt;&lt;strong&gt;腾讯行情&lt;/strong&gt;&lt;small&gt;TencentMarketDataProvider&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node external&quot;&gt;&lt;strong&gt;东方财富&lt;/strong&gt;&lt;small&gt;研报 / 新闻 / 分红 / 行业 / 风险&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node external&quot;&gt;&lt;strong&gt;新浪 / 巨潮&lt;/strong&gt;&lt;small&gt;财报 / 公司公告&lt;/small&gt;&lt;/div&gt;
              &lt;div class=&quot;node external&quot;&gt;&lt;strong&gt;OceanBase / MySQL / Redis&lt;/strong&gt;&lt;small&gt;向量检索、会话持久化、缓存&lt;/small&gt;&lt;/div&gt;
            &lt;/div&gt;
          &lt;/section&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel&quot; id=&quot;tools&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;tools-tab&quot; hidden&gt;
      &lt;div class=&quot;canvas&quot; aria-label=&quot;股票业务工具模块分组&quot;&gt;
        &lt;div class=&quot;tool-map&quot;&gt;
          &lt;section class=&quot;tool-group&quot;&gt;&lt;h2&gt;行情与技术&lt;/h2&gt;&lt;p&gt;即时行情、历史行情与技术指标解释。&lt;/p&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;MarketDataTools&lt;/code&gt;&lt;span&gt;market_quote · historical_bars · price_move_analysis&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;TechnicalIndicatorTools&lt;/code&gt;&lt;span&gt;MA · MACD · RSI · BOLL · ATR · OBV&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;MarketContextTools&lt;/code&gt;&lt;span&gt;基准表现 · 行业表现&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;StockAnalysisTools&lt;/code&gt;&lt;span&gt;股票快照分析&lt;/span&gt;&lt;/div&gt;
          &lt;/section&gt;
          &lt;section class=&quot;tool-group&quot;&gt;&lt;h2&gt;研究证据与事件&lt;/h2&gt;&lt;p&gt;事实发现、材料检索和公司事件解释。&lt;/p&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;ResearchEvidenceTools&lt;/code&gt;&lt;span&gt;news_search · knowledge_search · 财报指标&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;CorporateEventTools&lt;/code&gt;&lt;span&gt;company_announcements&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;StockBusinessSignalMapper&lt;/code&gt;&lt;span&gt;将领域 BusinessSignal 映射为工具响应&lt;/span&gt;&lt;/div&gt;
          &lt;/section&gt;
          &lt;section class=&quot;tool-group&quot;&gt;&lt;h2&gt;价值与因子&lt;/h2&gt;&lt;p&gt;确定性计算、估值比较与综合投资判断。&lt;/p&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;FinancialMetricTools&lt;/code&gt;&lt;span&gt;PE 等财务指标计算&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;InvestmentValueTools&lt;/code&gt;&lt;span&gt;机构预期 · 同行估值 · 分红 · 财务趋势&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;FactorAnalysisTools&lt;/code&gt;&lt;span&gt;因子画像 · business signals · investment analysis&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;ScenarioValuationTools&lt;/code&gt;&lt;span&gt;情景估值敏感性分析&lt;/span&gt;&lt;/div&gt;
          &lt;/section&gt;
          &lt;section class=&quot;tool-group&quot;&gt;&lt;h2&gt;工具共用层&lt;/h2&gt;&lt;p&gt;所有业务工具共享的稳定输出边界。&lt;/p&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;StockToolSupport&lt;/code&gt;&lt;span&gt;输入提取、标准成功/失败 JSON&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;StockToolError&lt;/code&gt;&lt;span&gt;业务错误码、公开提示、可重试标记&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;FinancialReportPeriodResolver&lt;/code&gt;&lt;span&gt;自然语言财报期间 → 标准报告期&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;StockFinancialToolSemanticValidator&lt;/code&gt;&lt;span&gt;财务工具输入与输出语义检查&lt;/span&gt;&lt;/div&gt;
          &lt;/section&gt;
          &lt;section class=&quot;tool-group&quot;&gt;&lt;h2&gt;业务规则与最终结果&lt;/h2&gt;&lt;p&gt;工具之外的股票场景约束。&lt;/p&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;StockAgentBusinessConfiguration&lt;/code&gt;&lt;span&gt;Bean 装配、提示词、澄清、计划安全边界&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;tool&quot;&gt;&lt;code&gt;StockFinalAnswerSemanticValidator&lt;/code&gt;&lt;span&gt;投资立场、事实与证据可追溯性校验&lt;/span&gt;&lt;/div&gt;
          &lt;/section&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;panel&quot; id=&quot;dependencies&quot; role=&quot;tabpanel&quot; aria-labelledby=&quot;dependencies-tab&quot; hidden&gt;
      &lt;div class=&quot;canvas&quot; aria-label=&quot;StockMind 业务模块依赖方向&quot;&gt;
        &lt;div class=&quot;dependency&quot;&gt;
          &lt;section class=&quot;module&quot;&gt;&lt;h2&gt;bootstrap&lt;/h2&gt;&lt;ul&gt;&lt;li&gt;Web API 与应用启动&lt;/li&gt;&lt;li&gt;stock 业务处理器&lt;/li&gt;&lt;li&gt;business.tool 工具适配&lt;/li&gt;&lt;li&gt;Spring Bean 装配&lt;/li&gt;&lt;/ul&gt;&lt;/section&gt;
          &lt;div class=&quot;module-arrow&quot;&gt;→&lt;/div&gt;
          &lt;section class=&quot;module&quot;&gt;&lt;h2&gt;infrastructure&lt;/h2&gt;&lt;ul&gt;&lt;li&gt;实现 application 数据端口&lt;/li&gt;&lt;li&gt;腾讯、新浪、东方财富、巨潮&lt;/li&gt;&lt;li&gt;EastmoneyRequestGate&lt;/li&gt;&lt;li&gt;Redis / JDBC 支撑&lt;/li&gt;&lt;/ul&gt;&lt;/section&gt;
          &lt;div class=&quot;module-arrow&quot;&gt;→&lt;/div&gt;
          &lt;section class=&quot;module&quot;&gt;&lt;h2&gt;application&lt;/h2&gt;&lt;ul&gt;&lt;li&gt;分析与快照用例&lt;/li&gt;&lt;li&gt;因子计算与情景估值&lt;/li&gt;&lt;li&gt;Provider 接口（端口）&lt;/li&gt;&lt;li&gt;不依赖基础设施实现&lt;/li&gt;&lt;/ul&gt;&lt;/section&gt;
          &lt;div class=&quot;module-arrow&quot;&gt;→&lt;/div&gt;
          &lt;section class=&quot;module&quot;&gt;&lt;h2&gt;domain / common&lt;/h2&gt;&lt;ul&gt;&lt;li&gt;股票领域模型与枚举&lt;/li&gt;&lt;li&gt;因子、论点、业务信号&lt;/li&gt;&lt;li&gt;文档提取与向量检索能力&lt;/li&gt;&lt;li&gt;无 Web / Provider 依赖&lt;/li&gt;&lt;/ul&gt;&lt;/section&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;div class=&quot;legend&quot;&gt;&lt;span&gt;&lt;b&gt;实线框&lt;/b&gt; 项目内模块或组件&lt;/span&gt;&lt;span&gt;&lt;b&gt;虚线框&lt;/b&gt; 外部服务或基础设施&lt;/span&gt;&lt;span&gt;&lt;b&gt;主路径&lt;/b&gt; 用户请求 → Agent Runtime → 业务工具 → 应用用例 → Provider&lt;/span&gt;&lt;/div&gt;
  &lt;/main&gt;
  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;stock-business-module-architecture&#x27;);
      const tabs = [...root.querySelectorAll(&#x27;.tab&#x27;)];
      const panels = [...root.querySelectorAll(&#x27;.panel&#x27;)];
      tabs.forEach((tab) =&gt; tab.addEventListener(&#x27;click&#x27;, () =&gt; {
        tabs.forEach((item) =&gt; item.setAttribute(&#x27;aria-selected&#x27;, String(item === tab)));
        panels.forEach((panel) =&gt; {
          const active = panel.id === tab.getAttribute(&#x27;aria-controls&#x27;);
          panel.classList.toggle(&#x27;active&#x27;, active);
          panel.hidden = !active;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
