<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 · StockMind</title>
  <style>
    :root{--ink:#172237;--muted:#6b778b;--brand:#315bea;--line:#dfe5ef;--canvas:#f5f7fb}*{box-sizing:border-box}html,body{width:100%;min-height:100%;margin:0}body{font:14px/1.5 Inter,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:#fff}.shell{width:100%;min-height:100vh;display:grid;grid-template-columns:1.08fr .92fr;overflow:hidden;background:#fff}.intro{min-height:100vh;padding:clamp(40px,7vw,112px);background:radial-gradient(circle at 15% 12%,rgba(101,137,255,.25),transparent 34%),linear-gradient(150deg,#172848,#263d71);color:#fff}.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}.mark{display:grid;place-items:center;width:32px;height:32px;border-radius:10px;background:#6b88ff}.intro h1{max-width:600px;margin:clamp(90px,17vh,180px) 0 18px;font-size:clamp(36px,3.1vw,56px);line-height:1.18;letter-spacing:-.04em}.intro p{max-width:500px;color:#c1cce0;font-size:16px}.facts{display:grid;max-width:560px;gap:14px;margin-top:48px}.fact{padding:14px 16px;border:1px solid rgba(207,220,255,.18);border-radius:12px;background:rgba(255,255,255,.06);font-size:14px}.panel{display:flex;align-items:center;justify-content:center;padding:clamp(36px,7vw,112px);background:linear-gradient(135deg,#fff 0,#f8faff 100%)}.form{width:min(100%,430px)}.form h2{margin:0 0 6px;font-size:30px}.sub{margin:0 0 30px;color:var(--muted)}.tabs{display:grid;grid-template-columns:1fr 1fr;margin-bottom:25px;padding:3px;border-radius:9px;background:#f0f3f8}.tabs button{border:0;border-radius:7px;padding:10px;background:transparent;color:var(--muted)}.tabs button.active{background:#fff;color:var(--brand);box-shadow:0 1px 4px rgba(36,53,81,.14)}label{display:block;margin:15px 0 6px;font-size:12px;font-weight:700}input{width:100%;height:46px;padding:0 13px;border:1px solid var(--line);border-radius:10px;outline:0}input:focus{border-color:#95a9fa;box-shadow:0 0 0 3px rgba(49,91,234,.12)}.display{display:none}.submit{width:100%;height:48px;margin-top:26px;border:0;border-radius:10px;background:var(--brand);color:#fff;font-weight:700}.submit:disabled{opacity:.65}.error{min-height:20px;margin:13px 0 0;color:#c43e3a;font-size:12px}.notice{margin-top:24px;color:var(--muted);font-size:11px}@media(max-width:700px){.shell{display:block}.intro{display:none}.panel{min-height:100vh;padding:28px;background:#fff}}
  </style>
</head>
<body>
  <main class="shell"><section class="intro"><div class="logo"><span class="mark">S</span>StockMind</div><h1>把研究过程，变成可验证的投资线索。</h1><p>连接行情、财报、公告与研究证据，在同一处完成股票研究。</p><div class="facts"><div class="fact">实时任务进展与可追溯工具调用</div><div class="fact">按个人账户隔离研究会话与偏好</div></div></section><section class="panel"><form id="form" class="form"><h2 id="title">欢迎回来</h2><p id="sub" class="sub">登录后继续你的研究工作。</p><div class="tabs"><button type="button" class="active" data-mode="login">登录</button><button type="button" data-mode="register">注册</button></div><div class="display" id="displayWrap"><label for="displayName">显示名称</label><input id="displayName" maxlength="128" placeholder="例如：张三" /></div><label for="username">用户名</label><input id="username" autocomplete="username" minlength="3" maxlength="32" placeholder="3-32 位字母、数字或下划线" required /><label for="password">密码</label><input id="password" type="password" autocomplete="current-password" minlength="8" maxlength="128" placeholder="至少 8 位" required /><button id="submit" class="submit">登录并进入工作台</button><p id="error" class="error" role="alert"></p><p class="notice">注册即代表你同意以本地账号方式使用 StockMind。</p></form></section></main>
  <script>
    const $=s=>document.querySelector(s);let mode="login";function setMode(next){mode=next;document.querySelectorAll("[data-mode]").forEach(x=>x.classList.toggle("active",x.dataset.mode===mode));$("#displayWrap").style.display=mode==="register"?"block":"none";$("#title").textContent=mode==="register"?"创建研究账户":"欢迎回来";$("#sub").textContent=mode==="register"?"注册后即可创建个人研究会话。":"登录后继续你的研究工作。";$("#submit").textContent=mode==="register"?"注册并进入工作台":"登录并进入工作台";$("#password").autocomplete=mode==="register"?"new-password":"current-password";$("#error").textContent=""}document.querySelectorAll("[data-mode]").forEach(x=>x.onclick=()=>setMode(x.dataset.mode));$("#form").onsubmit=async event=>{event.preventDefault();const button=$("#submit"),error=$("#error");button.disabled=true;error.textContent="";try{const response=await fetch("/api/v1/auth/"+(mode==="register"?"register":"login"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:$("#username").value,password:$("#password").value,displayName:$("#displayName").value})});const body=await response.json().catch(()=>({}));if(!response.ok)throw new Error(body.error||"请求失败");location.replace("/stream-chat.html")}catch(e){error.textContent=e.message||"登录失败，请稍后重试。"}finally{button.disabled=false}};
  </script>
</body>
</html>
