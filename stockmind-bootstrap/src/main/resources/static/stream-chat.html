<script>

  function renderContent(container,content){container.innerHTML="";let list=null,listKind="",evidenceBox=null,evidenceSummary=null,evidenceCount=0;for(const raw of String(content||"").split(/\r?\n/)){const line=raw.trim();if(!line){list=null;continue}if(line.startsWith("### ")){const title=line.slice(4);list=null;listKind=title==="结论依据"?"evidence":"";if(listKind){evidenceBox=document.createElement("details");evidenceBox.className="evidence-details";evidenceBox.open=true;evidenceSummary=document.createElement("summary");evidenceSummary.textContent="计算依据、数据口径与风险提示";evidenceBox.append(evidenceSummary);container.append(evidenceBox)}else{const h=document.createElement("h3");escapeText(h,title);container.append(h)}}else if(line.startsWith("- ")){if(!list){list=document.createElement("ul");if(listKind==="evidence"){list.className="evidence-list";evidenceBox?.append(list)}else container.append(list)}const li=document.createElement("li"),text=line.slice(2);if(listKind==="evidence"){evidenceCount++;if(text.startsWith("结论："))li.className="evidence-conclusion";else if(text.startsWith("支持："))li.className="evidence-support";else if(text.startsWith("限制："))li.className="evidence-limit"}escapeText(li,text);list.append(li)}else{const p=document.createElement("p");escapeText(p,line);container.append(p);list=null}}if(evidenceSummary&&evidenceCount)evidenceSummary.textContent="计算依据、数据口径与风险提示（"+evidenceCount+" 项）"}
  function appendMessage(role,content){$("#welcome")?.remove();const wrap=document.createElement("article");wrap.className="message "+role;if(role==="user"){const bubble=document.createElement("div");bubble.className="bubble";escapeText(bubble,content);wrap.append(bubble)}else{wrap.innerHTML='<div class="assistant-head"><span class="bot">S</span><b>StockMind</b><span>· AI 研究助手</span></div><div class="answer"></div>';renderContent(wrap.querySelector(".answer"),content)}chatBox.append(wrap);scrollBottom();return{wrap,text:wrap.querySelector(".answer")}}
  function setText(m,text){if(m?.text){renderContent(m.text,text);scrollBottom()}}
  const number=v=>typeof v==="number"?v:Number(v),money=v=>Number.isFinite(number(v))?number(v).toFixed(2)+" 元":"--",percent=v=>Number.isFinite(number(v))?(number(v)>=0?"+":"")+number(v).toFixed(1)+"%":"--";

  function addScoreCard(answer,data){const rows=Array.isArray(data?.score_breakdown)?data.score_breakdown.filter(x=>x.category_score!=null&&x.effective_weight_pct!=null):[];if(!rows.length)return;answer.querySelector(".score-card")?.remove();const card=document.createElement("section");card.className="insight-card score-card";const title=document.createElement("h3");title.textContent="综合因子评分（确定性计算）";const total=document.createElement("div");total.className="score-total";const score=document.createElement("b");escapeText(score,Number(data.overall_score).toFixed(2));const caption=document.createElement("span");escapeText(caption,"/ 100 · "+(data.style||"BALANCED")+" · 覆盖率 "+(data.coverage_pct??"--")+"%");total.append(score,caption);const note=document.createElement("p");note.className="insight-note";note.textContent="类别分按有效权重归一化；右列为该类别实际计入总分的分值。";const labels=document.createElement("div");labels.className="score-labels";labels.innerHTML="<span>因子类别</span><span>类别分</span><span>加权贡献</span>";card.append(title,total,note,labels);rows.forEach(row=>{const line=document.createElement("div");line.className="score-row";const label=document.createElement("div");const name=document.createElement("b");escapeText(name,categoryName[row.category]||row.category);const detail=document.createElement("small");escapeText(detail,"有效权重 "+(row.effective_weight_pct??"--")+"% · 覆盖 "+(row.coverage_pct??"--")+"%");label.append(name,detail);const value=document.createElement("span");escapeText(value,Number(row.category_score).toFixed(2));const contribution=document.createElement("b");escapeText(contribution,Number(row.contribution_points).toFixed(2));line.append(label,value,contribution);card.append(line)});answer.prepend(card)}
  function addScenarioCard(answer,data){const scenarios=Array.isArray(data?.scenarios)?data.scenarios:[];if(!scenarios.length)return;answer.querySelector(".scenario-card")?.remove();const card=document.createElement("section");card.className="insight-card scenario-card";const title=document.createElement("h3");title.textContent="价格情景";const note=document.createElement("p");note.className="insight-note";escapeText(note,"当前价 "+money(data.current_price)+" · 下一财年 EPS × Forward PE 假设");const grid=document.createElement("div");grid.className="scenario-grid";scenarios.forEach(item=>{const box=document.createElement("div"),kind=item.name||"";box.className="scenario "+(kind==="BASE"?"base":"");const label=document.createElement("span");escapeText(label,scenarioName[kind]||kind);const price=document.createElement("b");escapeText(price,money(item.targetPrice??item.target_price));const returnValue=item.expectedPriceReturnPct??item.expected_price_return_pct;const change=document.createElement("strong");change.className=number(returnValue)>=0?"up":"down";escapeText(change,percent(returnValue));const multiple=document.createElement("span");escapeText(multiple,"EPS "+(item.eps??"--")+" × PE "+(item.targetPe??item.target_pe??"--")+" 倍");box.append(label,price,change,multiple);grid.append(box)});const formula=document.createElement("div");formula.className="scenario-formula";formula.textContent="情景不是预测承诺；它展示 EPS 和估值倍数变化对目标价的影响。";card.append(title,note,grid,formula);answer.prepend(card)}

  function readSseStream(resp,handlers){return(async()=>{const reader=resp.body.getReader(),decoder=new TextDecoder();let buffer="";const dispatch=block=>{if(!block.trim())return;let name="message",lines=[];for(const line of block.split(/\r?\n/)){if(line.startsWith("event:"))name=line.slice(6).trim();else if(line.startsWith("data:"))lines.push(line.slice(5).trimStart())}if(!lines.length)return;let data=lines.join("\n");try{data=JSON.parse(data)}catch(_){};handlers[name]?.(data)};while(true){const r=await reader.read();if(r.done)break;buffer+=decoder.decode(r.value,{stream:true});const blocks=buffer.split(/\r?\n\r?\n/);buffer=blocks.pop()||"";blocks.forEach(dispatch)}buffer+=decoder.decode();dispatch(buffer)})()}

  function relativeTime(value){

  $("#sessionToggle").onclick=()=>{state.sessionsCollapsed=!state.sessionsCollapsed;const collapsed=state.sessionsCollapsed,$body=$(".left-body"),toggle=$("#sessionToggle");$body.classList.toggle("sessions-collapsed",collapsed);toggle.textContent=collapsed?"⌄":"⌃";toggle.title=collapsed?"展开历史会话":"折叠历史会话";toggle.setAttribute("aria-expanded",String(!collapsed))};
  $("#newChatBtn").onclick=()=>{if(generating)return;++state.conversationLoadToken;state.conversationId=null;state.messageCursor=0;state.messagesExhausted=true;showWelcome("开始一个新的分析","输入股票名称、代码或你关心的研究问题。");resetWorkflow();renderConversationList();closeDrawers();inputEl.focus()};
  const left=$("#leftPanel"),right=$("#rightPanel"),mask=$("#mask");function closeDrawers(){left.classList.remove("open");right.classList.remove("open");mask.classList.remove("open")}$("#navToggle").onclick=()=>{left.classList.add("open");mask.classList.add("open")};$("#researchToggle").onclick=()=>{right.classList.add("open");mask.classList.add("open")};$("#closeResearch").onclick=closeDrawers;mask.onclick=closeDrawers;
  const dialog=$("#devDialog");$("#devBtn").onclick=()=>{renderUser();dialog.showModal()};$("#closeDev").onclick=()=>dialog.close();$("#saveDev").onclick=async()=>{const button=$("#saveDev");button.disabled=true;try{state.user=await api("/api/v1/users/me",{method:"PATCH",body:JSON.stringify({displayName:$("#displayName").value.trim()||null,avatarUrl:$("#avatarUrl").value.trim()||null})});renderUser();dialog.close()}catch(error){alert("保存失败："+error.message)}finally{button.disabled=false}};
  $("#logoutBtn").onclick=async()=>{if(generating||!confirm("确定退出当前登录？"))return;try{await fetch("/api/v1/auth/logout",{method:"POST"})}finally{location.replace("/login.html")}};
  const connectionState=$("#connectionState");function setConnectionState(offline){connectionState.classList.toggle("visible",offline);if(!offline&&generating){const span=connectionState.querySelector("span");span.textContent="网络已恢复，正在重新连接研究任务…";connectionState.classList.add("visible");setTimeout(()=>connectionState.classList.remove("visible"),1800)}}window.addEventListener("offline",()=>setConnectionState(true));window.addEventListener("online",()=>setConnectionState(false));setConnectionState(!navigator.onLine);
  document.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();$("#stockSearch").focus()}if(e.key==="Escape")closeDrawers()});
  (async()=>{try{await loadCurrentUser();await loadConversations(false);if(!state.conversations.length)showWelcome()}catch(error){if(error.status===401){location.replace("/login.html");return}showWelcome("初始化失败",error.message)}finally{inputEl.focus()}})();
</script>
</body>
