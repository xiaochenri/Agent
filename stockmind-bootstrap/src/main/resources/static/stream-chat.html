<!doctype html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <style>

    .message{max-width:760px;margin:0 auto 22px}.message.user{display:flex;justify-content:flex-end}.bubble{max-width:78%;padding:11px 15px;border-radius:14px 14px 3px 14px;background:var(--brand);color:#fff;white-space:pre-wrap}.assistant-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:12px;color:var(--muted)}.bot{width:25px;height:25px;border-radius:8px;display:grid;place-items:center;background:var(--nav);color:#fff}.answer{font-size:15px}.answer p{margin:0 0 10px}.answer h3{margin:17px 0 8px;font-size:15px}.answer ul{padding-left:20px}.answer-card{margin:10px 0;border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden}.card-title{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:700}.pill{padding:3px 8px;border-radius:99px;background:#fff1ef;color:#b23f3a;font-size:11px}.card-body{padding:14px}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{padding:10px;background:#f7f8fa;border-radius:8px}.metric span{display:block;color:var(--muted);font-size:11px}.metric b{font-size:16px}.positive{color:var(--up)}.negative{color:var(--down)}.disclaimer{margin-top:10px;color:var(--muted);font-size:11px}

vent time{display:block;color:var(--muted);font-size:10px}.event b{font-size:12px}.delay{padding:8px 10px;border-radius:8px;background:#fff7e8;color:#87520f;font-size:11px}
    .workflow-list{padding:14px;display:grid;gap:12px}.workflow-empty{margin:34px 12px;text-align:center;color:var(--muted)}.workflow-empty-icon{width:48px;height:48px;margin:0 auto 12px;display:grid;place-items:center;border-radius:14px;background:var(--brand-soft);color:var(--brand);font-size:22px}.workflow-empty b{display:block;color:var(--ink);margin-bottom:5px}.workflow-empty p{margin:0;font-size:12px}.run-card{border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden}.run-card.active{border-color:#bac7fb;box-shadow:0 5px 18px rgba(49,91,234,.08)}.run-head{padding:12px 13px;border-bottom:1px solid var(--line);background:#fafbfc}.run-query{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.run-meta{display:flex;justify-content:space-between;margin-top:4px;color:var(--muted);font-size:10px}.run-status{color:var(--brand);font-weight:700}.run-card.done .run-status{color:var(--down)}.run-card.error .run-status{color:#c4423b}.flow{padding:14px 13px 5px}.flow-step{position:relative;display:grid;grid-template-columns:24px 1fr;gap:9px;padding-bottom:18px}.flow-step:not(:last-child)::after{content:"";position:absolute;left:11px;top:24px;bottom:0;width:1px;background:#dbe1eb}.step-icon{position:relative;z-index:1;width:24px;height:24px;border-radius:8px;display:grid;place-items:center;background:#eef1f5;color:#657184;font-size:11px}.flow-step.tool .step-icon{background:#fff3df;color:#a45c05}.flow-step.answer .step-icon{background:#e9f7f1;color:var(--down)}.flow-step.running .step-icon{background:var(--brand-soft);color:var(--brand);animation:pulse 1s infinite}.step-body b{display:block;font-size:11px}.step-body p{margin:2px 0 0;color:var(--muted);font-size:11px;line-height:1.45;word-break:break-word}.step-tool{display:inline-block;margin-top:5px;padding:2px 6px;border-radius:5px;background:#f4f5f7;color:#657184;font:10px ui-monospace,SFMono-Regular,monospace}.run-duration{padding:0 13px 12px;color:var(--muted);font-size:10px}
    .plan-group{margin:-7px 0 18px 33px;padding:11px 10px 3px 13px;border-left:2px solid #b9c6f8;border-radius:0 9px 9px 0;background:#f8f9ff}.plan-title{display:flex;justify-content:space-between;gap:8px;font-size:11px}.plan-title span{color:var(--brand);font-size:10px}.plan-method{margin:5px 0 11px;color:var(--muted);font-size:10px}.plan-step{position:relative;padding:0 0 12px 17px}.plan-step::before{content:"";position:absolute;left:0;top:4px;width:7px;height:7px;border:2px solid #aab6ca;border-radius:50%;background:#fff}.plan-step::after{content:"";position:absolute;left:4px;top:14px;bottom:0;width:1px;background:#d9deea}.plan-step:last-child::after{display:none}.plan-step.running::before{border-color:var(--brand);background:var(--brand-soft)}.plan-step.completed::before{border-color:var(--down);background:var(--down)}.plan-step.failed::before{border-color:#c4423b;background:#c4423b}.plan-step-head{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:11px}.plan-step-state{flex:none;color:var(--muted);font-size:9px}.plan-step.running .plan-step-state{color:var(--brand)}.plan-step.completed .plan-step-state{color:var(--down)}.plan-step-desc,.plan-step-expected{margin-top:2px;color:var(--muted);font-size:10px;line-height:1.4}.plan-step-tool{display:inline-block;margin-top:4px;padding:2px 6px;border-radius:5px;background:#fff0d8;color:#985603;font:9px ui-monospace,SFMono-Regular,monospace}
    .drawer-mask{display:none;position:fixed;inset:0;z-index:8;background:rgba(11,18,31,.45)}.dev-dialog{border:0;border-radius:14px;padding:0;box-shadow:var(--shadow);width:min(440px,calc(100% - 28px))}.dev-dialog::backdrop{background:rgba(11,18,31,.45)}.dialog-head{display:flex;justify-content:space-between;padding:17px 20px;border-bottom:1px solid var(--line)}.dialog-body{padding:18px 20px}.field{margin-bottom:13px}.field label{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}.field input{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px}.dialog-actions{display:flex;justify-content:flex-end;padding:0 20px 18px}.dialog-actions button{padding:8px 14px;border:0;border-radius:8px;background:var(--brand);color:#fff}
    @media(max-width:1279px){.app-shell{grid-template-columns:68px minmax(480px,1fr)}.left .brand-copy,.left .side-title,.left .session-search,.left .nav-item span,.left .nav-item small,.left .profile-info{display:none}.brand{padding:0;justify-content:center}.left-body{padding:14px 8px}.new-chat{font-size:0}.new-chat::after{content:"＋";font-size:22px}.nav-item{text-align:center;padding:9px 2px}.ticker-dot{margin:0}.right{position:fixed;right:0;top:0;bottom:0;z-index:10;width:min(400px,92vw);box-shadow:var(--shadow);transform:translateX(105%);transition:.25s}.right.open{transform:none}.drawer-mask.open{display:block}.icon-btn{display:block}.profile{justify-content:center}.dev-btn{display:none}.close-panel{display:block}}
    @media(max-width:767px){.app-shell{display:block}.left{position:fixed;inset:0 auto 0 0;z-index:10;width:min(310px,88vw);transform:translateX(-105%);transition:.25s;box-shadow:var(--shadow)}.left.open{transform:none}.left .brand-copy,.left .side-title,.left .session-search,.left .nav-item span,.left .nav-item small,.left .profile-info{display:block}.left .nav-item{text-align:left;padding:9px 10px}.left .ticker-dot{margin-right:8px}.left .brand{padding:0 18px;justify-content:flex-start}.center{height:100dvh;grid-template-rows:58px minmax(0,1fr) auto}.topbar{padding:8px 12px;gap:8px}.market{display:none}.search-wrap input{height:40px}.kbd{display:none}.messages{padding:20px 14px 12px}.welcome{margin-top:0}.welcome h1{font-size:22px}.prompts{grid-template-columns:1fr}.prompt:nth-child(n+3){display:none}.bubble{max-width:88%}.metrics{grid-template-columns:1fr 1fr}.composer-wrap{padding:0 10px max(10px,env(safe-area-inset-bottom))}.quick{margin-left:2px}.compose-hint{display:none}}
  </style>

<body>
<main class="app-shell">
  <aside id="leftPanel" class="side left" aria-label="主导航">
    <div class="brand"><div class="logo">S</div><div class="brand-copy"><strong>StockMind</strong><small>AI RESEARCH</small></div></div>
    <div class="left-body">
      <button id="newChatBtn" class="new-chat">＋ 新建分析</button>
      <div class="side-title">会话</div><input id="sessionSearch" class="session-search" placeholder="搜索会话…" />
      <nav id="conversationList" class="nav-list" aria-label="会话历史"><div class="nav-empty">正在加载会话…</div></nav>
    </div>
    <div class="left-foot"><div class="profile"><div id="profileAvatar" class="avatar">U</div><div class="profile-info"><b id="profileName">加载中…</b><small id="profileId" style="display:block;color:#77859a"></small></div><button id="devBtn" class="dev-btn" title="编辑用户资料">⚙</button></div></div>
  </aside>
  <section class="center">
    <header class="topbar"><button id="navToggle" class="icon-btn" aria-label="打开导航">☰</button><div class="search-wrap"><span class="search-icon">⌕</span><input id="stockSearch" placeholder="搜索股票代码、名称或提问" aria-label="搜索证券" /><span class="kbd">⌘ K</span></div><div class="market"><strong><i class="live"></i>A股 · 已收盘</strong><small>延迟行情 · 更新于 15:05:12</small></div><button id="researchToggle" class="icon-btn" aria-label="打开研究面板">▤</button></header>
    <section id="chatBox" class="messages" aria-live="polite">
      <div id="welcome" class="welcome"><span class="welcome-badge">股票研究智能体</span><h1>下午好，今天想研究什么？</h1><p>从技术面、基本面与公开事件中整理可验证的研究线索。</p><div class="prompts"><button class="prompt" data-prompt="分析宁德时代最近 3 个月的技术趋势"><strong>分析技术趋势</strong><span>均线、MACD、RSI 与量价关系</span></button><button class="prompt" data-prompt="综合分析贵州茅台的基本面和估值"><strong>基本面与估值</strong><span>增长质量、盈利能力与估值区间</span></button><button class="prompt" data-prompt="总结比亚迪近期重要新闻和潜在影响"><strong>梳理近期事件</strong><span>公告、新闻、财报与风险信号</span></button><button class="prompt" data-prompt="对比宁德时代和比亚迪的投资逻辑"><strong>同业对比</strong><span>核心指标、相对强弱与分歧点</span></button></div></div>
    </section>
    <footer class="composer-wrap"><div class="quick"><button class="chip active" data-prefix="综合分析：">综合</button><button class="chip" data-prefix="从技术面分析：">技术面</button><button class="chip" data-prefix="从基本面分析：">基本面</button><button class="chip" data-prefix="分析近期新闻：">新闻</button><button class="chip" data-prefix="对比分析：">对比</button></div><div id="composer" class="composer"><textarea id="input" rows="1" placeholder="输入股票或研究问题，Enter 发送…"></textarea><div class="compose-foot"><span class="context-tag">宁德时代 300750</span><span class="context-tag">近 3 月</span><span class="compose-hint">Shift + Enter 换行</span><button id="stopBtn" class="stop" title="停止生成">■</button><button id="sendBtn" class="send" title="发送">↑</button></div></div></footer>
  </section>
  <aside id="rightPanel" class="side right" aria-label="执行流程">
    <header class="research-head"><button id="closeResearch" class="close-panel" aria-label="关闭">×</button><h2>思考与工具调用</h2><p>按每轮提问实时展示 Agent 执行流程</p></header>
    <div id="workflowList" class="workflow-list"><div class="workflow-empty"><div class="workflow-empty-icon">⌁</div><b>暂无执行记录</b><p>发送问题后，这里会实时显示思考步骤和工具调用。</p></div></div>
  </aside>
</main>
<div id="mask" class="drawer-mask"></div>
<dialog id="devDialog" class="dev-dialog"><div class="dialog-head"><b>用户资料</b><button id="closeDev" style="border:0;background:transparent">×</button></div><div class="dialog-body"><div class="field"><label for="profileUserId">用户 ID</label><input id="profileUserId" readonly /></div><div class="field"><label for="displayName">显示名称</label><input id="displayName" maxlength="128" placeholder="研究员" /></div><div class="field"><label for="avatarUrl">头像 URL</label><input id="avatarUrl" maxlength="512" placeholder="可选" /></div></div><div class="dialog-actions"><button id="saveDev">保存</button></div></dialog>
<script>
  const $=s=>document.querySelector(s), chatBox=$("#chatBox"), inputEl=$("#input"), sendBtn=$("#sendBtn"), stopBtn=$("#stopBtn"), composer=$("#composer");
  let controller=null,lastInput="",generating=false;
  const state={user:null,conversations:[],conversationId:null,conversationLoadToken:0};
  const escapeText=(el,text)=>{el.textContent=text||""};
  function scrollBottom(){chatBox.scrollTop=chatBox.scrollHeight}
  function renderContent(container,content){container.innerHTML="";let list=null;for(const raw of String(content||"").split(/\r?\n/)){const line=raw.trim();if(!line){list=null;continue}if(line.startsWith("### ")){const h=document.createElement("h3");escapeText(h,line.slice(4));container.append(h);list=null}else if(line.startsWith("- ")){if(!list){list=document.createElement("ul");container.append(list)}const li=document.createElement("li");escapeText(li,line.slice(2));list.append(li)}else{const p=document.createElement("p");escapeText(p,line);container.append(p);list=null}}}
  function appendMessage(role,content){$("#welcome")?.remove();const wrap=document.createElement("article");wrap.className="message "+role;if(role==="user"){const bubble=document.createElement("div");bubble.className="bubble";escapeText(bubble,content);wrap.append(bubble)}else{wrap.innerHTML='<div class="assistant-head"><span class="bot">S</span><b>StockMind</b><span>· AI 研究助手</span></div><div class="answer"></div>';renderContent(wrap.querySelector(".answer"),content)}chatBox.append(wrap);scrollBottom();return{wrap,text:wrap.querySelector(".answer")}}
  function setText(m,text){if(m?.text){renderContent(m.text,text);scrollBottom()}}
  function readSseStream(resp,handlers){return(async()=>{const reader=resp.body.getReader(),decoder=new TextDecoder();let buffer="";const dispatch=block=>{if(!block.trim())return;let name="message",lines=[];for(const line of block.split(/\r?\n/)){if(line.startsWith("event:"))name=line.slice(6).trim();else if(line.startsWith("data:"))lines.push(line.slice(5).trimStart())}if(!lines.length)return;let data=lines.join("\n");try{data=JSON.parse(data)}catch(_){};handlers[name]?.(data)};while(true){const r=await reader.read();if(r.done)break;buffer+=decoder.decode(r.value,{stream:true});const blocks=buffer.split(/\r?\n\r?\n/);buffer=blocks.pop()||"";blocks.forEach(dispatch)}buffer+=decoder.decode();dispatch(buffer)})()}
  function typingController(message){let text="",timer,queue=[];const tick=()=>{const c=queue.shift();if(c){text+=c;setText(message,text)}else{clearInterval(timer);timer=null}};return{push(d){queue.push(...Array.from(d||""));timer||=(setInterval(tick,16))},finish(final){if(!text&&!queue.length&&final){text=final;setText(message,text)}},hasText:()=>Boolean(text||queue.length)}}
  async function api(url,options={}){
    const headers={...(options.body?{"Content-Type":"application/json"}:{}),...(options.headers||{})};
    const response=await fetch(url,{...options,headers});
    if(!response.ok){const body=await response.text();throw new Error(body||`HTTP ${response.status}`)}
    if(response.status===204)return null;
    return response.json();
  }
  function resetWorkflow(){
    $("#workflowList").innerHTML='<div class="workflow-empty"><div class="workflow-empty-icon">⌁</div><b>暂无执行记录</b><p>发送问题后，这里会实时显示思考步骤和工具调用。</p></div>';
  }
  function showWelcome(title="下午好，今天想研究什么？",description="从技术面、基本面与公开事件中整理可验证的研究线索。"){
    chatBox.innerHTML='<div id="welcome" class="welcome"><span class="welcome-badge">股票研究智能体</span><h1></h1><p></p><div class="prompts"><button class="prompt" data-prompt="分析宁德时代最近 3 个月的技术趋势"><strong>分析技术趋势</strong><span>均线、MACD、RSI 与量价关系</span></button><button class="prompt" data-prompt="综合分析贵州茅台的基本面和估值"><strong>基本面与估值</strong><span>增长质量、盈利能力与估值区间</span></button><button class="prompt" data-prompt="总结比亚迪近期重要新闻和潜在影响"><strong>梳理近期事件</strong><span>公告、新闻、财报与风险信号</span></button><button class="prompt" data-prompt="对比宁德时代和比亚迪的投资逻辑"><strong>同业对比</strong><span>核心指标、相对强弱与分歧点</span></button></div></div>';
    escapeText($("#welcome h1"),title);escapeText($("#welcome p"),description);
    chatBox.querySelectorAll("[data-prompt]").forEach(button=>button.onclick=()=>sendMessage(button.dataset.prompt));
  }
  function relativeTime(value){
    if(!value)return "";const time=new Date(value).getTime();if(!Number.isFinite(time))return "";
    const seconds=Math.max(0,Math.floor((Date.now()-time)/1000));
    if(seconds<60)return "刚刚";if(seconds<3600)return Math.floor(seconds/60)+" 分钟";if(seconds<86400)return Math.floor(seconds/3600)+" 小时";
    return new Date(value).toLocaleDateString("zh-CN",{month:"numeric",day:"numeric"});
  }
  function renderConversationList(){
    const list=$("#conversationList"),keyword=$("#sessionSearch").value.trim().toLowerCase();list.innerHTML="";
    const conversations=state.conversations.filter(item=>(item.title||"新会话").toLowerCase().includes(keyword));
    if(!conversations.length){const empty=document.createElement("div");empty.className="nav-empty";empty.textContent=keyword?"没有匹配的会话":"暂无会话";list.append(empty);return}
    conversations.forEach(item=>{const button=document.createElement("button");button.className="nav-item"+(item.id===state.conversationId?" active":"");button.dataset.id=item.id;
      const dot=document.createElement("i");dot.className="ticker-dot";dot.textContent=(item.title||"新").trim().slice(0,1).toUpperCase();
      const title=document.createElement("span");title.textContent=item.title||"新会话";
      const time=document.createElement("small");time.textContent=relativeTime(item.lastMessageAt||item.updatedAt||item.createdAt);
      button.append(dot,title,time);button.onclick=()=>selectConversation(item.id);list.append(button)});
  }
  function renderUser(){
    const user=state.user;if(!user)return;const name=user.displayName||user.username||"研究员";
    escapeText($("#profileName"),name);escapeText($("#profileId"),user.id);escapeText($("#profileAvatar"),name.trim().slice(0,2).toUpperCase()||"U");
    $("#profileUserId").value=user.id||"";$("#displayName").value=user.displayName||"";$("#avatarUrl").value=user.avatarUrl||"";
  }
  async function loadCurrentUser(){state.user=await api("/api/v1/users/me");renderUser()}
  async function loadConversations(selectFirst=false){
    state.conversations=await api("/api/v1/conversations?businessCode=stock&limit=100");
    if(selectFirst&&!state.conversationId&&state.conversations.length){await selectConversation(state.conversations[0].id);return}
    renderConversationList();
  }
  async function createConversation(){
    const conversation=await api("/api/v1/conversations",{method:"POST",body:JSON.stringify({businessCode:"stock"})});
    state.conversationId=conversation.id;state.conversations=[conversation,...state.conversations.filter(item=>item.id!==conversation.id)];renderConversationList();return conversation;
  }
  async function selectConversation(conversationId){
    if(generating||!conversationId)return;state.conversationId=conversationId;renderConversationList();closeDrawers();
    const token=++state.conversationLoadToken;chatBox.innerHTML='<div class="welcome"><span class="welcome-badge">正在加载会话…</span></div>';resetWorkflow();
    try{const messages=await api(`/api/v1/conversations/${encodeURIComponent(conversationId)}/messages?limit=100`);if(token!==state.conversationLoadToken)return;
      chatBox.innerHTML="";messages.slice().reverse().filter(item=>item.status==="completed"&&(item.role==="user"||item.role==="assistant")).forEach(item=>appendMessage(item.role,item.content));
      if(!chatBox.children.length)showWelcome("开始一个新的分析","输入股票名称、代码或你关心的研究问题。");scrollBottom();
    }catch(error){if(token===state.conversationLoadToken){chatBox.innerHTML="";showWelcome("会话加载失败",error.message)}}
  }
  async function ensureConversation(){if(state.conversationId)return state.conversationId;return(await createConversation()).id}
  function workflowRun(query){
    const list=$("#workflowList");list.querySelector(".workflow-empty")?.remove();
    list.querySelectorAll(".run-card.active").forEach(card=>card.classList.remove("active"));
    const card=document.createElement("section");card.className="run-card active";
    card.innerHTML='<div class="run-head"><b class="run-query"></b><div class="run-meta"><span class="run-time"></span><span class="run-status">执行中</span></div></div><div class="flow"></div><div class="run-duration"></div>';
    escapeText(card.querySelector(".run-query"),query);card.querySelector(".run-time").textContent=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});list.prepend(card);
    const started=Date.now(),flow=card.querySelector(".flow"),planSeen=new Set(),planStepEls=new Map();let lastText="",planGroup=null;
    function ensurePlan(data){
      if(planGroup)return planGroup;
      planGroup=document.createElement("section");planGroup.className="plan-group";
      planGroup.innerHTML='<div class="plan-title"><b>执行计划</b><span></span></div><div class="plan-method">执行方法：按步骤顺序调用工具；失败时进入 revise_plan 修订</div><div class="plan-steps"></div>';
      planGroup.querySelector(".plan-title span").textContent=(data?.plan_id||"计划执行中")+(data?.step_count?" · "+data.step_count+" 步":"");flow.append(planGroup);return planGroup;
    }
    function renderPlan(data){
      const event=data.planEvent||data.event||"",key=[event,data.step_id||data.plan_id||"",data.step_name||""].join("|");if(planSeen.has(key))return;planSeen.add(key);
      const group=ensurePlan(data),steps=group.querySelector(".plan-steps");
      if(event==="plan_created"&&Array.isArray(data.steps)){
        data.steps.forEach((item,index)=>{const id=item.step_id||"step_"+(index+1);if(planStepEls.has(id))return;const el=document.createElement("div");el.className="plan-step pending";el.dataset.stepId=id;el.innerHTML='<div class="plan-step-head"><b></b><span class="plan-step-state">待执行</span></div><div class="plan-step-desc"></div><span class="plan-step-tool"></span><div class="plan-step-expected"></div>';escapeText(el.querySelector("b"),(index+1)+". "+(item.name||id));escapeText(el.querySelector(".plan-step-desc"),item.description||"执行计划步骤");const tool=el.querySelector(".plan-step-tool");if(item.tool)escapeText(tool,"方法 · "+item.tool);else tool.remove();const expected=el.querySelector(".plan-step-expected");if(item.expected_outcome)escapeText(expected,"预期 · "+item.expected_outcome);else expected.remove();steps.append(el);planStepEls.set(id,el)})
      }
      const id=data.step_id,el=id?planStepEls.get(id):null;if(el){const states={step_started:["running","执行中"],step_completed:["completed","已完成"],step_failed:["failed","失败"],step_failed_expected_mismatch:["failed","未达预期"]},state=states[event];if(state){el.className="plan-step "+state[0];el.querySelector(".plan-step-state").textContent=state[1]}}
      if(event==="plan_completed")group.querySelector(".plan-title span").textContent=(data.plan_id||"执行计划")+" · 已完成";
    }
    function addStep(data,fallbackType){
      if(data?.category==="plan"||String(data?.message||"").startsWith("计划事件：")||String(data?.message||"").startsWith("计划步骤：")){renderPlan(data);return}
      const raw=typeof data==="string"?data:(data?.message||data?.description||data?.stage||data?.toolName||"");if(!raw||raw===lastText)return;lastText=raw;
      const namedTool=data?.toolName||data?.tool||data?.name||"",match=raw.match(/(?:调用工具|工具)[：:]\s*([\w.-]+)/i),tool=namedTool||(match?.[1]||"");const looksTool=Boolean(tool)||/工具|tool|调用|查询|检索|执行/i.test(raw),type=looksTool?"tool":fallbackType||"thought";
      flow.querySelectorAll(":scope > .flow-step.running").forEach(x=>x.classList.remove("running"));const step=document.createElement("div");step.className="flow-step "+type+" running";const icon=type==="tool"?"⌘":type==="answer"?"✓":"◇",title=type==="tool"?"工具调用":type==="answer"?"生成回答":"分析思考";step.innerHTML='<span class="step-icon">'+icon+'</span><div class="step-body"><b>'+title+'</b><p></p></div>';escapeText(step.querySelector("p"),raw);if(tool){const tag=document.createElement("span");tag.className="step-tool";escapeText(tag,tool);step.querySelector(".step-body").append(tag)}flow.append(step);card.scrollIntoView({block:"nearest"})
    }
    return{event:data=>addStep(data,"thought"),answer(){addStep("已整理分析结果并生成回答","answer")},finish(status="done"){flow.querySelectorAll(":scope > .flow-step.running").forEach(x=>x.classList.remove("running"));card.classList.remove("active");card.classList.add(status);card.querySelector(".run-status").textContent=status==="done"?"已完成":status==="stopped"?"已停止":"执行失败";card.querySelector(".run-duration").textContent="耗时 "+((Date.now()-started)/1000).toFixed(1)+" 秒"},clear(){flow.innerHTML=""}}
  }
  function setGenerating(value){generating=value;composer.classList.toggle("generating",value);inputEl.disabled=value}
  async function sendMessage(override){
    const input=(override??inputEl.value).trim();if(!input||generating)return;lastInput=input;setGenerating(true);
    let assistant=null,run=null,runStatus="done";
    try{
      const conversationId=await ensureConversation();appendMessage("user",input);inputEl.value="";inputEl.style.height="auto";
      assistant=appendMessage("assistant","");const typing=typingController(assistant);run=workflowRun(input);run.event("正在加载用户记忆和会话上下文");controller=new AbortController();
      const response=await fetch(`/api/v1/conversations/${encodeURIComponent(conversationId)}/messages/stream`,{
        method:"POST",headers:{"Content-Type":"application/json"},signal:controller.signal,
        body:JSON.stringify({input,requestId:crypto.randomUUID?.()||String(Date.now())})
      });
      if(!response.ok)throw new Error(await response.text()||`HTTP ${response.status}`);
      await readSseStream(response,{
        process:data=>run.event(data),status:data=>run.event(data),
        reply_delta:data=>typing.push(data?.text||""),text_delta:data=>typing.push(data?.text||""),
        done:data=>{run.answer();typing.finish(data?.message?.content||data?.reply||"")},
        error:data=>{throw new Error(data?.message||String(data||"请求异常"))}
      });
      if(!typing.hasText())setText(assistant,"未收到有效响应，请稍后重试。");
      await loadConversations(false);
    }catch(error){
      if(error.name==="AbortError"){runStatus="stopped";if(assistant)setText(assistant,"已停止生成。你可以调整问题后重新发送。")}
      else{runStatus="error";run?.event("执行异常："+(error.message||error));if(!assistant)assistant=appendMessage("assistant","");setText(assistant,"连接出现问题："+(error.message||error));const retry=document.createElement("button");retry.className="chip";retry.textContent="重新尝试";retry.onclick=()=>sendMessage(lastInput);assistant.wrap.append(retry)}
    }finally{run?.finish(runStatus);controller=null;setGenerating(false);inputEl.focus()}
  }
  sendBtn.onclick=()=>sendMessage();stopBtn.onclick=()=>controller?.abort();inputEl.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}};inputEl.oninput=()=>{inputEl.style.height="auto";inputEl.style.height=Math.min(inputEl.scrollHeight,130)+"px"};
  document.querySelectorAll("[data-prompt]").forEach(b=>b.onclick=()=>sendMessage(b.dataset.prompt));document.querySelectorAll("[data-prefix]").forEach(b=>b.onclick=()=>{document.querySelectorAll("[data-prefix]").forEach(x=>x.classList.remove("active"));b.classList.add("active");inputEl.value=b.dataset.prefix;inputEl.focus()});
  $("#sessionSearch").oninput=renderConversationList;
  $("#newChatBtn").onclick=async()=>{if(generating)return;const button=$("#newChatBtn");button.disabled=true;try{await createConversation();showWelcome("开始一个新的分析","输入股票名称、代码或你关心的研究问题。");resetWorkflow();closeDrawers();inputEl.focus()}catch(error){showWelcome("创建会话失败",error.message)}finally{button.disabled=false}};
  const left=$("#leftPanel"),right=$("#rightPanel"),mask=$("#mask");function closeDrawers(){left.classList.remove("open");right.classList.remove("open");mask.classList.remove("open")}$("#navToggle").onclick=()=>{left.classList.add("open");mask.classList.add("open")};$("#researchToggle").onclick=()=>{right.classList.add("open");mask.classList.add("open")};$("#closeResearch").onclick=closeDrawers;mask.onclick=closeDrawers;
  const dialog=$("#devDialog");$("#devBtn").onclick=()=>{renderUser();dialog.showModal()};$("#closeDev").onclick=()=>dialog.close();$("#saveDev").onclick=async()=>{const button=$("#saveDev");button.disabled=true;try{state.user=await api("/api/v1/users/me",{method:"PATCH",body:JSON.stringify({displayName:$("#displayName").value.trim()||null,avatarUrl:$("#avatarUrl").value.trim()||null})});renderUser();dialog.close()}catch(error){alert("保存失败："+error.message)}finally{button.disabled=false}};
  document.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();$("#stockSearch").focus()}if(e.key==="Escape")closeDrawers()});
  (async()=>{try{await loadCurrentUser();await loadConversations(true);if(!state.conversations.length)showWelcome()}catch(error){showWelcome("初始化失败",error.message)}finally{inputEl.focus()}})();
</script>
